{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-3xl font-black text-gray-800 mb-8">{% if club %}تعديل نادي{% else %}إضافة نادي جديد{% endif %}
        </h1>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            <div>
                <label class="block text-sm font-bold mb-2">الاسم بالعربية</label>
                <input type="text" name="name_ar" required value="{{ club.name_ar if club else '' }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">الوصف بالعربية</label>
                <textarea name="description_ar" rows="4" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg">{{ club.description_ar if club else '' }}</textarea>
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">English Name</label>
                <input type="text" name="name_en" required value="{{ club.name_en if club else '' }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">English Description</label>
                <textarea name="description_en" rows="4" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg">{{ club.description_en if club else '' }}</textarea>
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">French Name (Nom)</label>
                <input type="text" name="name_fr" required value="{{ club.name_fr if club else '' }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">French Description</label>
                <textarea name="description_fr" rows="4" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg">{{ club.description_fr if club else '' }}</textarea>
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">Spanish Name (Nombre)</label>
                <input type="text" name="name_es" required value="{{ club.name_es if club else '' }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">Spanish Description</label>
                <textarea name="description_es" rows="4" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg">{{ club.description_es if club else '' }}</textarea>
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">Icon</label>
                <input type="text" name="icon" value="{{ club.icon if club else 'palette' }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Material icon name">
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">Image</label>
                <input type="file" name="image" accept="image/*"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div class="flex gap-4">
                <button type="submit" class="btn-primary">حفظ</button>
                <a href="{{ url_for('admin_clubs') }}"
                    class="bg-gray-200 text-gray-800 px-6 py-2 rounded-lg hover:bg-gray-300">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
